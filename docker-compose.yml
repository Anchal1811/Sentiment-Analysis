version: '3.8'

services:
  backend:
    build: ./Backend
    ports:
      - "8001:8001"
    volumes:
      - ./Backend/models:/app/models
    environment:
      - MLFLOW_TRACKING_URI=./mlruns

  frontend:
    build: ./Frontend
    ports:
      - "8502:8501"  # Fixes the 'Access Denied' port conflict
    environment:
      - BACKEND_URL=http://backend:8001/predict
    depends_on:
      - backend